<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GitOps Sample App - deployment metadata dashboard">
    <title>GitOps Sample App</title>
    <meta http-equiv="refresh" content="30">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #111;
            color: #e5e5e5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 4rem 1.5rem;
        }

        .container {
            max-width: 640px;
            width: 100%;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 2rem;
        }

        .env-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2rem;
        }

        .env-badge--development {
            background: #1e3a5f;
            color: #7db8f0;
        }

        .env-badge--staging {
            background: #3d3214;
            color: #d4a841;
        }

        .env-badge--production, .env-badge--prod {
            background: #1a3a2a;
            color: #4ade80;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        tr {
            border-bottom: 1px solid #222;
        }

        td {
            padding: 0.75rem 0;
            vertical-align: top;
        }

        td:first-child {
            font-size: 0.75rem;
            font-weight: 500;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            width: 140px;
            white-space: nowrap;
        }

        td:last-child {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #e5e5e5;
            word-break: break-all;
        }

        .footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #222;
            font-size: 0.7rem;
            color: #444;
        }

        @media (max-width: 480px) {
            body { padding: 2rem 1rem; }
            td:first-child { width: 100px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GitOps Sample App</h1>
        <p class="subtitle">Deployment Metadata</p>
        <span class="env-badge env-badge--{{.Environment}}">{{.Environment}}</span>

        <table>
            <tr>
                <td>Version</td>
                <td>{{.Version}}</td>
            </tr>
            <tr>
                <td>Commit</td>
                <td>{{.GitCommit}}</td>
            </tr>
            <tr>
                <td>Built</td>
                <td>{{.BuildTime}}</td>
            </tr>
            <tr>
                <td>Environment</td>
                <td>{{.Environment}}</td>
            </tr>
            <tr>
                <td>Pod</td>
                <td>{{.PodName}}</td>
            </tr>
            <tr>
                <td>Node</td>
                <td>{{.NodeName}}</td>
            </tr>
            <tr>
                <td>Host IP</td>
                <td>{{.HostIP}}</td>
            </tr>
        </table>

        <div class="footer">
            Uptime: {{.Uptime}} / Go {{.GoVersion}} / Auto-refreshes every 30s
        </div>
    </div>
</body>
</html>
